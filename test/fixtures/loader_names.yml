# --- Fixtures for the "name-match-no-primary:" search directive ---
# (test/models/search/loader/name/directives/name_match_no_primary_test.rb)
#
# Each simple_name below is chosen to hit exactly one of the directive's
# conditions, using existing `name` fixtures that are otherwise unrelated
# to loader names:
#   - has_no_instances / no_instances: unique simple_name, zero instances,
#     so "no primary instance" is trivially true.
#   - metrosideros_costata: has a comb_nov (primary_instance) instance.
#   - name_matches_another_1/_2: two different `name` rows share this
#     exact simple_name, so it fails the directive's "exactly one
#     matching name" requirement.
#
# Like the guard-ordering fixtures above, none of these set
# comment/distribution/remark_to_reviewers, so they add exactly 1 (not
# expanded) entry each to the *any-batch*/print-any-batch/batch-name-*
# unscoped count assertions - see the count updates in:
#   test/models/search/loader/name/simple_with_any_batch_test.rb
#   test/models/search/loader/name/print/simple_with_any_batch_test.rb
#   test/models/search/loader/name/simple_with_batch_name_asterisk_test.rb
#   test/models/search/loader/name/hybrid/no_hybrid_flag_test.rb

